<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Emotion Classifier</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f4f4f4;
            padding-top: 50px;
        }
        .container {
            max-width: 600px;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 10px #ccc;
        }
    </style>
</head>
<body>
<!DOCTYPE html>
<html>
<head>
    <title>Audio Emotion Classification</title>
</head>
<body>
    <h1>Upload Audio File for Emotion Prediction</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="audio" accept=".wav" required>
        <button type="submit">Predict</button>
    </form>

    {% if emotion %}
        <h2>Predicted Emotion: {{ emotion }}</h2>
    
        <audio controls>
            <source src="{{ audio_url }}" type="audio/wav">
            Your browser does not support the audio element.
        </audio>
    {% endif %}
</body>
</html>

</body>
</html>
